<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealMap | 国家真实面积与投影对比</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-grid"></div>
  <main class="app-shell">
    <div class="top-actions">
      <p id="utc8-time" class="time-display">--</p>
      <a class="icon-btn" href="https://github.com/QianYuan1437/RealMap" target="_blank" rel="noopener noreferrer" aria-label="打开仓库">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.49 0-.24-.01-.88-.01-1.73-2.78.62-3.37-1.37-3.37-1.37-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.67.35-1.11.64-1.37-2.22-.26-4.55-1.14-4.55-5.08 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05.8-.23 1.66-.34 2.51-.34.85 0 1.71.11 2.51.34 1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.95-2.33 4.81-4.56 5.07.36.32.67.94.67 1.89 0 1.36-.01 2.45-.01 2.79 0 .27.18.59.69.49A10.27 10.27 0 0 0 22 12.23C22 6.58 17.52 2 12 2z"/>
        </svg>
      </a>
      <button id="theme-toggle" class="icon-btn" type="button" aria-label="切换日夜主题">
        <svg id="theme-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 4a1 1 0 0 1 1 1v1.3a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1zm0 12.7a1 1 0 0 1 1 1V19a1 1 0 1 1-2 0v-1.3a1 1 0 0 1 1-1zm8-4.7a1 1 0 0 1 0 2h-1.3a1 1 0 1 1 0-2H20zM6.3 12a1 1 0 1 1 0 2H5a1 1 0 1 1 0-2h1.3zm10.18-5.59a1 1 0 0 1 1.41 1.41l-.92.92a1 1 0 0 1-1.42-1.41l.93-.92zm-8.45 8.45a1 1 0 0 1 1.41 1.42l-.92.92a1 1 0 1 1-1.42-1.41l.93-.93zm8.45 1.42a1 1 0 0 1 0-1.42 1 1 0 0 1 1.41 0l.93.93a1 1 0 0 1-1.42 1.41l-.92-.92zM8.03 6.41l.93.92a1 1 0 0 1-1.42 1.41l-.92-.92a1 1 0 1 1 1.41-1.41zM12 8.2a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6z"/>
        </svg>
      </button>
    </div>
    <header class="hero">
      <p class="kicker">RealMap</p>
      <h1>真实面积查看器</h1>
      <p class="subtitle">查看国家实际面积，并比较不同地图投影下的面积视觉差异</p>
    </header>

    <section class="controls card">
      <div class="control-item">
        <label for="country-select">选择国家</label>
        <div class="select-wrap">
          <select id="country-select" disabled>
            <option>加载中...</option>
          </select>
        </div>
      </div>
      <div class="control-item">
        <label for="projection-select">左侧投影</label>
        <div class="select-wrap">
          <select id="projection-select">
            <option value="EqualEarth">Equal Earth（等积）</option>
            <option value="NaturalEarth1">Natural Earth</option>
            <option value="Mercator">Mercator</option>
          </select>
        </div>
      </div>
      <div class="control-item">
        <label for="compare-select">右侧投影</label>
        <div class="select-wrap">
          <select id="compare-select">
            <option value="Mercator">Mercator</option>
            <option value="EqualEarth">Equal Earth（等积）</option>
            <option value="NaturalEarth1">Natural Earth</option>
          </select>
        </div>
      </div>
    </section>

    <section class="stats-grid">
      <article class="card stat">
        <p class="stat-label">真实面积</p>
        <p id="real-area" class="stat-value">--</p>
        <p class="stat-hint">单位：平方公里 km²</p>
      </article>
      <article class="card stat">
        <p class="stat-label">面积排名</p>
        <p id="rank-area" class="stat-value">--</p>
        <p id="rank-hint" class="stat-hint">--</p>
      </article>
      <article class="card stat">
        <p class="stat-label">投影失真比</p>
        <p id="distortion" class="stat-value">--</p>
        <p id="distortion-hint" class="stat-hint">右侧 / 左侧 像素面积</p>
      </article>
    </section>

    <section class="card meter-wrap">
      <div class="meter-header">
        <p>面积相对尺度</p>
        <p id="meter-value">--</p>
      </div>
      <div class="meter-track">
        <div id="meter-bar" class="meter-bar"></div>
      </div>
    </section>

    <section class="maps-grid">
      <article class="card map-panel">
        <div class="panel-title">
          <h2 id="left-title">Equal Earth（等积）</h2>
        </div>
        <svg id="map-left" viewBox="0 0 840 420" aria-label="左侧投影地图"></svg>
      </article>
      <article class="card map-panel">
        <div class="panel-title">
          <h2 id="right-title">Mercator</h2>
        </div>
        <svg id="map-right" viewBox="0 0 840 420" aria-label="右侧投影地图"></svg>
      </article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="./script.js"></script>
</body>
</html>
